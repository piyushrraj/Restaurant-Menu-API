<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-center">

    <div class="card">

        <h2>✏️ Edit Menu Item</h2>

        <form method="POST" class="form-box">

            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" value="{{ item.name }}" required>
            </div>
            
            <div class="form-group">
                <label for="price">Price</label>
                <input id="price" type="number" name="price" value="{{ item.price }}" required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <input id="category" type="text" name="category" value="{{ item.category }}" required>
            </div>

            <button type="submit" class="update-btn">Update Item</button>

        </form>

        <a href="/menu" class="back-btn">⬅ Back to Menu</a>

    </div>

</div>

</body>
</html>
