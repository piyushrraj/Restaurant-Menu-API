<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">

        <h2>🍽️ Restaurant Menu</h2>

        <div style="text-align:center; margin-bottom:20px;">
            <a href="/">⬅ Home</a>
            &nbsp;&nbsp;
            <a href="/add">➕ Add Item</a>
        </div>

        <table>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Category</th>
                <th>Action</th>
            </tr>

            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.category }}</td>
                <td>
                    <a href="/edit/{{ item._id }}" class="edit">Edit</a>
                    <a href="/delete/{{ item._id }}" class="delete"
                        onclick="return confirm('Are you sure you want to delete this item?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>
</body>

</html>
